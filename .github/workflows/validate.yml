name: Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq ripgrep shellcheck shfmt

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            brew install jq
          fi

          if ! command -v rg >/dev/null 2>&1; then
            brew install ripgrep
          fi

          if ! command -v shellcheck >/dev/null 2>&1; then
            brew install shellcheck
          fi

          if ! command -v shfmt >/dev/null 2>&1; then
            brew install shfmt
          fi

      - name: Run full validation
        run: bash scripts/validate.sh --full

      - name: Direct Claude plugin validation (best effort)
        shell: bash
        run: |
          if command -v claude >/dev/null 2>&1; then
            python3 - <<'PY'
          import subprocess

          targets = ["plugins/harness-engineering"]

          for target in targets:
              try:
                  subprocess.run(
                      ["claude", "plugin", "validate", target],
                      check=True,
                      timeout=60,
                  )
              except subprocess.TimeoutExpired:
                  print(f"Claude plugin validation for {target} timed out after 60s; skipped.")
              except subprocess.CalledProcessError as exc:
                  print(
                      f"Claude plugin validation for {target} failed "
                      f"with exit code {exc.returncode}; ignored."
                  )
          PY
          else
            echo "Claude CLI is not available on this runner; skipped direct plugin validation."
          fi
